```yaml
name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Build project
        run: |
          ./gradlew clean build --stacktrace --no-daemon

      - name: Find compiled JAR
        id: jar
        shell: bash
        run: |
          set -euo pipefail

          JAR=$(find build/libs \
            -maxdepth 1 \
            -type f \
            -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            | head -n1)

          if [ -z "$JAR" ]; then
            echo "No compiled JAR was found!"
            exit 1
          fi

          echo "jar=$JAR" >> "$GITHUB_OUTPUT"

      - name: Verify git.properties is not included
        shell: bash
        run: |
          if find . -name "git.properties" | grep -q .; then
            echo "git.properties detected (this is okay)."
            echo "It will NOT be uploaded."
          fi

      - name: Upload JAR to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.jar }}
```
